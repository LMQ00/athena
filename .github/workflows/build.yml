name: Build Debug APK

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - '**.md'
      - '.gitignore'
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 设置 Android SDK
        uses: android-actions/setup-android@v3

      - name: 安装 Android SDK 37
        run: |
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install 'platforms;android-37' 2>&1 || echo "SDK 37 already installed or not needed"

      - name: 配置 local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: 授权 gradlew
        run: chmod +x gradlew

      - name: 构建 Debug APK
        run: ./gradlew assembleDebug

      - name: 上传 APK 产物
        uses: actions/upload-artifact@v4
        with:
          name: athena-debug
          path: app/build/outputs/apk/debug/
          if-no-files-found: error
